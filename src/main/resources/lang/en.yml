addon: "RebarWorldedit"

messages:
  startup:
    incompatible: "Incompatible environment! The plugin has been disabled!"
    trying-update: "Attempting to update automatically..."
    loading-items: "Loading items..."
    registering-commands: "Registering commands..."
    register-commands-failed: "Failed to register commands!"
    done: "Successfully enabled this addon"
    unsupported-guizhanlib-version: "Unable to compatible with GuizhanLib, automatic update failed!"
    auto-update-failed: "Automatic update failed!"
    null-minecraft-version: "Unable to get Minecraft version!"
    unknown-minecraft-version: "Unable to recognize Minecraft version! Use this plugin with caution!"
  shutdown:
    goodbye: "Successfully disabled this addon"
  command:
    help:
      content:
        - "<green>======= SFWorldedit Command List =======&r"
        - "<aqua>/rw help (subcommand) <gray>- <yellow>Display help information"
        - "<aqua>/rw reload <gray>- <yellow>Reload configuration file"
        - "<aqua>/rw version <gray>- <yellow>Display plugin version"
        - "<aqua>/rw pos1 <gray>- <yellow>Set the first position"
        - "<aqua>/rw pos2 <gray>- <yellow>Set the second position"
        - "<aqua>/rw paste <sfid> [-override|-o] [-force|-f] <gray>- <yellow>Paste the specified Rebar block into the selected area"
        - "<aqua>/rw clone [-override|-o] <gray>- <yellow>Clone the selected area to the position you are standing"
        - "<aqua>/rw clear [-callhandler|-c] [-skipvanilla|-s] <gray>- <yellow>Clear blocks in the selected area"
        - "<aqua>/rw clearpos <gray>- <yellow>Clear the position you have marked"
        - ""
        - "<aqua>======================"
        - "<aqua>Author(s): <yellow>balugaq"
        - "<aqua>Code Written By: <yellow>balugaq"
        - "<aqua>Artwork By: <yellow>balugaq"
        - "<aqua>Translated By: <yellow>balugaq"
        - ""
        - "<aqua>QQ Group Chat: <yellow>855656308"
        - "<aqua>GitHub Repository: <yellow>https://github.com/balugaq/RebarWorldedit"
        - "<aqua>Bug Reports: <yellow>https://github.com/balugaq/RebarWorldedit/issues"
      usage:
        help:
          - "<aqua>/rw help [subcommand]"
          - "<aqua>subcommand: <yellow>The name of the subcommand (leave blank to display all commands)"
        pos1:
          - "<aqua>/rw pos1 <gray>- <yellow>Set the first position"
        pos2:
          - "<aqua>/rw pos2 <gray>- <yellow>Set the second position"
        paste:
          - "<aqua>/rw paste <blockId> [override] [force] <gray>- <yellow>Paste the specified Rebar block into the selected area"
          - "<aqua>blockId: <yellow>The specified Rebar block ID"
          - "<aqua>[-override]: <yellow>Override existing Rebar blocks"
          - "<aqua>[force]: <yellow>Skip the NotPlaceable check and force-paste the specified Rebar block"
        clone:
          - "<aqua>/rw clone [override] <gray>- <yellow>Clone the selected area to the position you are standing"
          - "<aqua>[override]: <yellow>Override existing blocks"
        clear:
          - "<aqua>/rw clear [skip-vanilla|skip-rebar] <gray>- <yellow>Clear blocks in the selected area"
          - "<aqua>[skip-vanilla]: <yellow>Skip vanilla blocks"
          - "<aqua>[skip-rebar]: <yellow>Skip Slimefun blocks"
        clearpos:
          - "<aqua>/rw clearpos <gray>- <yellow>Clear the position you have marked"
        reload:
          - "<aqua>/rw reload <gray>- <yellow>Reload configuration file"
        version:
          - "<aqua>/rw version <gray>- <yellow>Display plugin version"
        rule:
          - "<aqua>/rw rule <rule> <gray>- <yellow>Update the rule"
        confirm:
          - "<aqua>/rw confirm <gray>- <yellow>Confirm the last load"
    setpos1:
      success: "<green>The first position is marked at %pos%."
      success-with-range: "<green>The first position is marked as %pos%, with a total of <yellow>%range% <green>blocks."
    setpos2:
      success: "<green>The second position is marked at %pos%."
      success-with-range: "<green>The second position is marked as %pos%, with a total of <yellow>%range% <green>blocks."
    paste:
      start: "<green>Pasting %block% into the range of <yellow>%pos1% <green>~ <yellow>%pos2%."
      success: "<green>Pasted <yellow>%blocks% <green>%block%. Time elapsed: <yellow>%time% <green>ms."
    setblock:
      start: "<green>Setting %block% at %pos%."
      success: "<green>Set <green>%block% at %pos%. Time elapsed: <yellow>%time% <green>ms."
    clone:
      start: "<green>Cloning blocks in the range of <yellow>%pos1% <green>~ <yellow>%pos2% <green>to the position you are standing."
      success: "<green>Cloned <yellow>%blocks% <green>blocks to the position you are standing. Time elapsed: <yellow>%time% <green>ms."
    clear:
      start: "<green>Clearing blocks in the range of <yellow>%pos1% <green>~ <yellow>%pos2%."
      success: "<green>Cleared <yellow>%blocks% <green>blocks. Time elapsed: <yellow>%time% <green>ms."
    clearpos:
      success: "<green>Cleared the position you have marked."
    reload:
      success: "<green>Configuration file has been reloaded."
    version:
      content: "<yellow>%name% <aqua>Plugin version: <yellow>%version%"
    rule:
      success: "<green>Updated the rule."
    confirm:
      success: "<green>Confirmed."
  error:
    no-permission: "&cYou do not have permission to perform this load."
    player-only: "&cThis command can only be executed by a player."
    console-only: "&cThis command can only be executed by the console."
    no-selection: "&cYou have not selected a valid area."
    world-mismatch: "&cThe area is in two different worlds."
    invalid-rebar-block-id: "&cInvalid Rebar block ID."
    block-only: "&cYou can only place blocks."
    air-block: "&cYou cannot place air blocks."
    too-many-blocks: "&cToo many blocks in the specified area (maximum is %max%, but currently is %current%)"
    invalid-rule: "&cInvalid rule."
    no-request: "&cYou have not made any requests."
    missing-argument: "&cMissing argument <%argument%>"

guide:
  page:
    main: "Rebar Worldedit"

item:
  worldeditor:
    name: <green>Rebar WorldEditor
    lore: |-
      <green>Left click <gray>- <yellow>Set the first position
      <green>Right click <gray>- <yellow>Set the second position
